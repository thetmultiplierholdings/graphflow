yarnPath: .yarn/releases/yarn-4.9.2.cjs
nodeLinker: pnpm
enableConstraintsChecks: true

packageExtensions:
  "@google-cloud/opentelemetry-resource-util@*":
    dependencies:
      "@opentelemetry/api": "*"
  # @langfuse/openai depends on @langfuse/core (which peer-requires
  # @opentelemetry/api) but doesn't declare @opentelemetry/api itself, so the
  # pnpm linker can't satisfy that peer for this dependency branch. Declare it
  # so @langfuse/openai resolves the same @opentelemetry/api our own workspace
  # already provides to @langfuse/otel.
  "@langfuse/openai@*":
    dependencies:
      "@opentelemetry/api": "*"
  # drizzle-orm declares @opentelemetry/api and postgres as OPTIONAL peers; under
  # the pnpm linker the virtual-package hash incorporates how each optional peer
  # resolves per consumer, so once one workspace (platform-service) pulls these
  # the libs it shares drizzle types with get a different virtual and the
  # SQL/PgTable/PgColumn types stop unifying. Inject both as drizzle dependencies
  # so every consumer resolves one virtual. postgres is pinned to the consumers'
  # range (^3.4.7) rather than "*" so it does not introduce a second postgres
  # version that would re-split the virtual.
  "drizzle-orm@*":
    dependencies:
      "@opentelemetry/api": "*"
      "postgres": "^3.4.7"
  "storybook@*":
    dependencies:
      "@storybook/react-vite": "*"
      "@storybook/addon-essentials": "*"
  # Univer's preset packages import @univerjs/core and @univerjs/themes without
  # declaring them (they assume a hoisted node_modules). Declare them so the
  # pnpm linker resolves the bare imports from the packages' own location.
  "@univerjs/preset-sheets-core@*":
    dependencies:
      "@univerjs/core": "0.21.1"
      "@univerjs/themes": "0.21.1"
  # tiptap-markdown imports @tiptap/pm/{model,state} but only declares
  # @tiptap/core as a peer, so the pnpm linker doesn't surface @tiptap/pm into
  # its virtual store. Declare it here so resolution works at runtime/test time.
  "tiptap-markdown@*":
    peerDependencies:
      "@tiptap/pm": "^2.0.0"

npmScopes:
  multiplier-client:
    npmRegistryServer: "https://us-west1-npm.pkg.dev/multiplier-platform/multiplier-platform-production-npm-public-repo/"
